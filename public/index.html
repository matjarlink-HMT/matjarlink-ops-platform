<!doctype html><html dir="rtl" lang="ar"><head>
<meta charset="utf-8"><title>لوحة إدارة فريق متجرلينك — AI Ops</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{--plum:#9D1F60;--plum-deep:#6E1444;--plum-ink:#4E0E30;--orange:#E8890F;--orange-soft:#FCEBD3;
--ink:#241E2A;--muted:#8A7F90;--faint:#B7AEBD;--ground:#F5F1ED;--card:#fff;--line:#EBE2E9;
--ok:#1E8E5A;--ok-soft:#E4F4EC;--warn:#C98A0B;--warn-soft:#FBF0D8;--bad:#C0392B;--bad-soft:#FBE9E7;
--info:#2D6FB3;--info-soft:#E6EFF8;--shadow:0 1px 3px rgba(36,30,42,.06),0 6px 18px rgba(36,30,42,.04)}
*{box-sizing:border-box}body{margin:0;background:var(--ground);color:var(--ink);
font-family:"SF Arabic","Segoe UI",system-ui,Tahoma,sans-serif;line-height:1.6}
.app{display:grid;grid-template-columns:1fr 15.5rem;min-height:100vh}
@media(max-width:820px){.app{grid-template-columns:1fr}.side{position:sticky;top:0;z-index:40}}
.side{background:linear-gradient(200deg,var(--plum-deep),var(--plum-ink));color:#fff;padding:1.1rem .8rem;position:sticky;top:0;height:100vh;overflow:auto}
@media(max-width:820px){.side{height:auto;padding:.4rem;display:flex;gap:.3rem;overflow-x:auto}}
.brand{display:flex;align-items:center;gap:.55rem;padding:.2rem .5rem 1rem}
@media(max-width:820px){.brand{display:none}}
.brand .logo{width:2.1rem;height:2.1rem;border-radius:9px;background:var(--orange);display:grid;place-items:center;font-weight:800}
.brand b{font-size:1rem;display:block;line-height:1.2}.brand span{font-size:.68rem;opacity:.7}
.nav{display:flex;flex-direction:column;gap:.15rem}@media(max-width:820px){.nav{flex-direction:row}}
.nav button{all:unset;display:flex;align-items:center;gap:.6rem;padding:.5rem .65rem;border-radius:9px;cursor:pointer;font-size:.86rem;color:#f4e9f0;white-space:nowrap}
.nav button .cnt{margin-inline-start:auto;background:rgba(255,255,255,.16);border-radius:999px;font-size:.66rem;padding:.02rem .42rem}
.nav button:hover{background:rgba(255,255,255,.09)}.nav button.on{background:#fff;color:var(--plum-ink);font-weight:700}
.main{padding:1.4rem 1.6rem 4rem;overflow:auto}@media(max-width:820px){.main{padding:1rem}}
.top{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}
.top h1{margin:0;font-size:1.35rem;color:var(--plum)}.top p{margin:.15rem 0 0;color:var(--muted);font-size:.85rem}
.banner{border-radius:12px;padding:.55rem .85rem;font-size:.82rem;margin-bottom:1rem;display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.banner.mock{background:var(--warn-soft);color:#8a5e05;border:1px solid #f0dca6}
.banner.live{background:var(--ok-soft);color:#14603c;border:1px solid #c7e8d6}
.dotlive{width:.5rem;height:.5rem;border-radius:50%;background:var(--ok)}
.panel{display:none}.panel.on{display:block}
.sec-h{display:flex;align-items:center;gap:.5rem;margin:.2rem 0 .8rem}.sec-h h2{margin:0;font-size:1.05rem}.sec-h .hint{color:var(--muted);font-size:.78rem}
.grid{display:grid;gap:.9rem}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.g4,.g3{grid-template-columns:repeat(2,1fr)}}@media(max-width:680px){.g2,.g3,.g4{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:.9rem 1rem;box-shadow:var(--shadow)}
.kpi .n{font-size:1.7rem;font-weight:800;color:var(--plum);line-height:1.1}.kpi .l{font-size:.78rem;color:var(--muted)}.kpi .d{font-size:.72rem;margin-top:.2rem}
.pill{display:inline-flex;align-items:center;gap:.3rem;border-radius:999px;padding:.08rem .55rem;font-size:.7rem;font-weight:700}
.p-ok{background:var(--ok-soft);color:var(--ok)}.p-warn{background:var(--warn-soft);color:#9a6a06}.p-bad{background:var(--bad-soft);color:var(--bad)}
.p-info{background:var(--info-soft);color:var(--info)}.p-idle{background:#EEE9EE;color:var(--muted)}.p-new{background:var(--orange-soft);color:#b96b06}
.agent .hd{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem}.agent .av{width:2.2rem;height:2.2rem;border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:.9rem}
.agent .nm{font-weight:800;font-size:.92rem}.agent .rl{font-size:.72rem;color:var(--muted)}
.agent .task{font-size:.82rem;margin:.3rem 0;padding:.35rem .5rem;background:var(--ground);border-radius:8px}
.row{display:flex;align-items:center;gap:.4rem;font-size:.78rem;margin-top:.35rem}.bar{flex:1;height:.4rem;background:#EEE9EE;border-radius:999px;overflow:hidden}.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--plum))}
.sug{font-size:.78rem;color:#6d5f74;margin-top:.4rem;border-inline-start:2px solid var(--orange);padding-inline-start:.5rem}.sug b{color:var(--orange)}
.qwrap{max-height:62vh;overflow-y:auto;display:flex;flex-direction:column;gap:.7rem}
.qcard{display:flex;gap:.8rem;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:.6rem;cursor:pointer;box-shadow:var(--shadow)}
.qcard:hover{border-color:var(--orange)}.thumb{flex:0 0 4.4rem;aspect-ratio:9/16;border-radius:9px;display:grid;place-items:center;color:#fff;text-align:center;font-weight:800;font-size:.66rem;padding:.2rem;position:relative}
.thumb .tp{position:absolute;top:.25rem;inset-inline-start:.25rem;font-size:.6rem;background:rgba(0,0,0,.28);border-radius:5px;padding:.02rem .28rem}
.qmeta{flex:1;display:flex;flex-direction:column;justify-content:center;gap:.2rem}.qt{font-weight:800;font-size:.9rem}.qi{font-size:.75rem;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:.83rem}th,td{text-align:right;padding:.5rem .6rem;border-bottom:1px solid var(--line)}th{font-size:.72rem;color:var(--muted);background:var(--ground)}
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:13px;background:var(--card);box-shadow:var(--shadow)}
.feed{display:flex;flex-direction:column;gap:.7rem}.msg{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:.7rem .8rem;box-shadow:var(--shadow)}
.mh{display:flex;align-items:center;gap:.5rem;font-size:.8rem}.mh .who{font-weight:800}.mh .tm{color:var(--faint);font-size:.72rem;margin-inline-start:auto}.mt{font-size:.88rem;margin:.35rem 0 .5rem}
.reply{display:flex;gap:.4rem}.reply input{flex:1;border:1px solid var(--line);border-radius:9px;padding:.4rem .6rem;font:inherit;font-size:.82rem;background:var(--ground)}
.btn{all:unset;cursor:pointer;background:var(--plum);color:#fff;border-radius:9px;padding:.4rem .8rem;font-size:.8rem;font-weight:700;text-align:center}.btn.sm{padding:.28rem .6rem;font-size:.74rem}.btn.ok{background:var(--ok)}.btn.ghost{background:transparent;color:var(--plum);border:1px solid var(--line)}
.chan{width:1.4rem;height:1.4rem;border-radius:6px;display:grid;place-items:center;color:#fff;font-size:.72rem}
.acc{display:flex;align-items:center;gap:.7rem}.acc .ic{width:2.4rem;height:2.4rem;border-radius:10px;display:grid;place-items:center;color:#fff}
.ov{position:fixed;inset:0;background:rgba(36,20,44,.55);display:none;align-items:center;justify-content:center;z-index:60;padding:1rem}.ov.on{display:flex}
.modal{background:#fff;border-radius:18px;width:min(46rem,100%);max-height:90vh;display:grid;grid-template-columns:16rem 1fr;overflow:hidden}@media(max-width:680px){.modal{grid-template-columns:1fr}}
.mprev{background:#2a1230;display:grid;place-items:center;padding:1rem;position:relative}.mbig{width:100%;aspect-ratio:9/16;max-height:58vh;border-radius:12px;display:grid;place-items:center;color:#fff;text-align:center;padding:1rem;font-weight:800}
.mbody{padding:1.1rem 1.2rem;overflow-y:auto}.mbody h3{margin:.1rem 0;color:var(--plum)}.kv{display:flex;justify-content:space-between;font-size:.82rem;padding:.3rem 0;border-bottom:1px dashed var(--line)}.kv b{color:var(--muted);font-weight:600}
.cap{font-size:.85rem;background:var(--ground);border-radius:10px;padding:.6rem;margin:.6rem 0;max-height:11rem;overflow-y:auto;white-space:pre-line}
.mbody textarea{width:100%;min-height:4.5rem;border:1px solid var(--line);border-radius:10px;padding:.5rem;font:inherit;font-size:.85rem;background:var(--ground)}
.x{all:unset;position:absolute;top:.6rem;inset-inline-start:.6rem;cursor:pointer;background:rgba(255,255,255,.15);color:#fff;width:1.9rem;height:1.9rem;border-radius:50%;display:grid;place-items:center}
a.link{color:var(--plum);font-weight:700;font-size:.82rem}.foot{color:var(--faint);font-size:.74rem;text-align:center;margin-top:1.4rem}
.loading{text-align:center;padding:4rem;color:var(--muted)}
</style></head><body>
<div class="app">
  <main class="main">
    <div class="top"><div><h1 id="ptitle">نظرة عامة</h1><p>لوحة تشغيل فريق الذكاء الاصطناعي — متجرلينك</p></div>
      <div id="conn" class="live" style="font-size:.76rem;color:var(--muted)"></div></div>
    <div id="banner"></div>
    <div id="content"><div class="loading">…جارٍ تحميل بيانات المنصة</div></div>
    <div class="foot" id="foot"></div>
  </main>
  <aside class="side"><div class="brand"><div class="logo">ML</div><div><b>متجرلينك</b><span>AI Ops · مركز التشغيل</span></div></div>
    <nav class="nav" id="nav"></nav></aside>
</div>
<div class="ov" id="ov"><div class="modal"><div class="mprev"><button class="x" id="mx">✕</button><div class="mbig" id="mbig"></div></div>
  <div class="mbody"><h3 id="mtitle"></h3><div id="mchan" style="color:var(--muted);font-size:.8rem;margin-bottom:.5rem"></div>
    <div id="mkv"></div><div class="cap" id="mcap"></div><a class="link" id="mdrive" target="_blank">↗ افتح التصميم في Drive</a>
    <label style="font-size:.78rem;font-weight:700;display:block;margin:.5rem 0 .3rem">ملاحظات المراجعة</label>
    <textarea id="mnote" placeholder="بلا ملاحظة = اعتماد تلقائي"></textarea>
    <div style="display:flex;gap:.5rem;margin-top:.7rem"><button class="btn ok" id="mapprove">✓ اعتماد</button><button class="btn" id="msave">حفظ ملاحظة</button><button class="btn ghost" id="mnext">التالي ↩</button></div>
    <div id="msaved" style="font-size:.78rem;margin-top:.5rem;color:var(--ok)"></div></div></div></div>

<script type="module">
const CH={IG:["#C13584","IG"],FB:["#1877F2","f"],WA:["#25D366","WA"],TT:["#111","TT"],LI:["#0A66C2","in"],TH:["#111","@"]};
const chan=k=>{const c=CH[k]||["#888","?"];return `<span class="chan" style="background:${c[0]}">${c[1]}</span>`};
const pill=a=>a?`<span class="pill ${a[1]}">${a[0]}</span>`:"";
const STMAP={online:"p-ok",working:"p-info",scheduled:"p-info",idle:"p-idle",action:"p-bad",new:"p-new"};
const $=s=>document.querySelector(s);
let S=null,cur=0;const notes={};try{Object.assign(notes,JSON.parse(localStorage.getItem("ml_notes")||"{}"))}catch(e){}
const saveN=()=>{try{localStorage.setItem("ml_notes",JSON.stringify(notes))}catch(e){}};

const NAV=[["overview","نظرة عامة",""],["agents","الفريق (الوكلاء)","agents"],["needs","الاحتياجات","needs"],
["queue","قائمة النشر","queue"],["prep","قيد الإعداد","prep"],["camp","الحملات",""],["pub","آخر ما نُشر","published"],
["comments","التعليقات","comments"],["messages","الرسائل","messages"],["accounts","الحسابات","accounts"]];

async function load(){
  try{ S=await (await fetch("/api/state")).json(); }
  catch(e){ $("#content").innerHTML=`<div class="loading">تعذّر الاتصال بالخادم. شغّل <code>npm start</code>.</div>`; return; }
  renderConn(); renderNav(); render("overview");
}
function renderConn(){
  const c=S.connectivity||{};
  const b=$("#banner");
  if(S.mode==="live"){b.className="banner live";b.innerHTML=`<span class="dotlive"></span> <b>وضع حيّ</b> — يسحب البيانات الحقيقية. Meta ${c.meta?"✓":"—"} · واتساب ${c.whatsapp?"✓":"—"} · Windsor ${c.windsor?"✓":"—"}`;}
  else{b.className="banner mock";b.innerHTML=`<b>وضع تجريبي (mock)</b> — بيانات نموذجية. أضف المفاتيح في .env وحوّل MODE=live لتفعيل السحب الحيّ.`;}
  $("#conn").textContent="آخر تحديث: "+(S.generatedAt||"").slice(11,16);
}
function renderNav(){
  $("#nav").innerHTML=NAV.map((n,i)=>{const cnt=n[2]&&S[n[2]]?S[n[2]].length:"";
    return `<button data-go="${n[0]}" class="${i==0?'on':''}"><span>${n[1]}</span>${cnt!==""?`<span class="cnt">${cnt}</span>`:""}</button>`}).join("");
  document.querySelectorAll("#nav button").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#nav button").forEach(x=>x.classList.remove("on"));b.classList.add("on");
    $("#ptitle").textContent=NAV.find(n=>n[0]===b.dataset.go)[1];render(b.dataset.go);window.scrollTo(0,0);});
}
function render(p){
  const C=$("#content");
  if(p==="overview")C.innerHTML=ovv();
  else if(p==="agents")C.innerHTML=`<div class="grid g3">${S.agents.map(agentCard).join("")}</div>`;
  else if(p==="needs")C.innerHTML=`<div class="grid g2">${S.needs.map(needCard).join("")}</div>`;
  else if(p==="queue"){C.innerHTML=`<div class="qwrap">${S.queue.map((q,i)=>qCard(q,i)).join("")}</div>`;bindQueue();}
  else if(p==="prep")C.innerHTML=prepTbl();
  else if(p==="camp")C.innerHTML=campView();
  else if(p==="pub")C.innerHTML=pubTbl();
  else if(p==="comments"){C.innerHTML=feed(S.comments,"c","comment");bindReply("c");}
  else if(p==="messages"){C.innerHTML=feed(S.messages,"m","dm");bindReply("m");}
  else if(p==="accounts")C.innerHTML=`<div class="grid g2">${S.accounts.map(accCard).join("")}</div>`;
}
function ovv(){
  const k=S.kpis.map(x=>`<div class="card kpi"><span class="n">${x[0]}</span><span class="l">${x[1]}</span><span class="d">${pill([x[2],x[3]])}</span></div>`).join("");
  const ins=S.insights?`<div class="card"><div class="sec-h"><h2>الأداء (Windsor)</h2><span class="hint">${S.insights.updatedFor}</span></div>
    <div class="grid g4"><div class="kpi"><span class="n">${S.insights.reach??"—"}</span><span class="l">الوصول</span></div>
    <div class="kpi"><span class="n">${S.insights.impressions??"—"}</span><span class="l">الظهور</span></div>
    <div class="kpi"><span class="n">${S.insights.engagement??"—"}</span><span class="l">التفاعل</span></div>
    <div class="kpi"><span class="n">${S.insights.clicks??"—"}</span><span class="l">النقرات</span></div></div></div>`
    :`<div class="card"><b>الأداء:</b> غير مربوط — أضف WINDSOR_API_KEY لعرض بيانات الوصول والتفاعل.</div>`;
  return `<div class="grid g4">${k}</div><div style="margin-top:1rem">${ins}</div>`;
}
const agentCard=a=>`<div class="card agent"><div class="hd"><div class="av" style="background:${a.c}">${a.n.slice(0,2).toUpperCase()}</div>
<div><div class="nm">${a.n}${a.NEW?' <span class="pill p-new">جديد</span>':''}</div><div class="rl">${a.r}</div></div></div>
<div>${pill([a.st[1],STMAP[a.st[0]]])}</div><div class="task">${a.task}</div>
${a.sc>0?`<div class="row"><span>التقييم</span><span class="bar"><i style="width:${a.sc}%"></i></span><b>${a.sc}</b></div>`:`<div class="row">${pill(["لا تقييم بعد","p-idle"])}</div>`}
<div style="font-size:.79rem;color:var(--muted);margin-top:.35rem">${a.ev}</div><div class="sug"><b>اقتراح ذاتي:</b> ${a.sug}</div></div>`;
const needCard=n=>`<div class="card"><div style="display:flex;gap:.4rem;align-items:center;margin-bottom:.35rem">${pill(n.t)} ${pill(n.pr)}<span style="margin-inline-start:auto;font-size:.74rem;color:var(--muted)">${n.f}</span></div>
<div style="font-weight:800">${n.ti}</div><div style="font-size:.82rem;color:#5f5566;margin-top:.25rem">${n.d}</div></div>`;
const qCard=(q,i)=>`<div class="qcard" data-i="${i}"><div class="thumb" style="background:linear-gradient(160deg,${q.tyc},${q.tyc}cc)"><span class="tp">${q.id}</span>${q.ty.includes('ريل')?'▶':''}<div style="margin-top:.2rem">${q.t.slice(0,20)}</div></div>
<div class="qmeta"><div class="qt">${q.t}</div><div class="qi">${chan(q.ch)} ${q.ty} · ${q.date}</div><div>${pill(q.st)} ${notes[q.id]?'<span class="pill p-idle">📝 ملاحظة</span>':''}</div></div></div>`;
const prepTbl=()=>`<div class="tbl-wrap"><table><thead><tr><th>بدء التصميم ▲</th><th>العنوان</th><th>القناة</th><th>النوع</th><th>الوكيل</th><th>الحالة</th></tr></thead><tbody>
${S.prep.slice().sort((a,b)=>a.d<b.d?-1:1).map(p=>`<tr><td style="font-weight:700">${p.d}</td><td>${p.t}</td><td>${chan(p.ch)} ${p.ch}</td><td>${p.ty}</td><td style="color:var(--muted)">${p.ag}</td><td>${pill(p.st)}</td></tr>`).join("")}</tbody></table></div>`;
const pubTbl=()=>`<div class="tbl-wrap"><table><thead><tr><th>المحتوى</th><th>المنصة</th><th>التاريخ</th><th>الأداء</th></tr></thead><tbody>
${S.published.map(p=>`<tr><td style="font-weight:700">${p.url?`<a class="link" target="_blank" href="${p.url}">${p.t}</a>`:p.t}</td><td>${chan(p.ch)} ${p.ch}</td><td>${p.d}</td><td style="color:var(--muted)">${p.m}</td></tr>`).join("")}</tbody></table></div>`;
const campView=()=>`<div class="card" style="text-align:center;padding:1.4rem"><div style="font-weight:800;color:var(--plum)">لا حملات مدفوعة نشطة</div>
<p style="color:var(--muted);font-size:.85rem">سياسة ما قبل الإطلاق. المخطّط:</p><div class="grid g2" style="text-align:right;max-width:34rem;margin:auto">
${S.campaigns.map(c=>`<div class="card" style="box-shadow:none"><div style="font-weight:800;font-size:.88rem">${c.name}</div><div style="font-size:.8rem;color:var(--muted)">${c.meta}</div><div style="margin-top:.4rem">${pill(c.st)}</div></div>`).join("")}</div></div>`;
const accCard=a=>{const c=CH[a.ch];return `<div class="card acc"><div class="ic" style="background:${c[0]}">${c[1]}</div><div style="flex:1"><div style="font-weight:800">${a.h}</div><div style="font-size:.75rem;color:var(--muted)">${a.s}</div></div>${pill(a.st)}</div>`};
function feed(list,kind,replyKind){
  const note=S.mode==="live"?"":'<div class="banner mock" style="margin-bottom:.8rem">وضع تجريبي — الرد محاكاة. في الوضع الحيّ يُرسل فعليًا عبر API.</div>';
  return note+`<div class="feed">${list.map((m,i)=>`<div class="msg"><div class="mh">${chan(m.ch)} <span class="who">${m.who}</span> <span style="font-size:.72rem;color:var(--faint)">${m.ref||''}</span><span class="tm">${m.tm}</span></div>
  <div class="mt">${m.tx}</div>${m.sug!==""?`<div class="reply"><input value="${(m.sug||'').replace(/"/g,'&quot;')}" id="${kind}${i}"><button class="btn sm" data-r="${kind}${i}" data-ch="${m.ch}" data-id="${m.id||''}" data-kind="${replyKind}">رد</button></div><div id="s${kind}${i}" style="font-size:.78rem;color:var(--ok);margin-top:.4rem"></div>`:`<div style="font-size:.76rem;color:var(--warn)">بانتظار تفعيل القناة</div>`}</div>`).join("")}</div>`;
}
function bindReply(kind){document.querySelectorAll("[data-r]").forEach(b=>b.onclick=async()=>{
  const k=b.dataset.r,msg=$("#"+k).value.trim();if(!msg)return;
  b.textContent="…";
  try{const r=await (await fetch("/api/reply",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({channel:b.dataset.ch,target:b.dataset.id,message:msg,kind:b.dataset.kind})})).json();
    $("#s"+k).textContent=r.simulated?"✓ محاكاة (فعّل MODE=live للإرسال الحقيقي)":r.ok?"✓ أُرسل الرد":"✗ "+(r.error||"خطأ");
    b.textContent="تم";b.classList.add("ok");}catch(e){$("#s"+k).textContent="✗ تعذّر الإرسال";b.textContent="رد";}
});}
function bindQueue(){document.querySelectorAll(".qcard").forEach(c=>c.onclick=()=>openModal(+c.dataset.i));}
function openModal(i){cur=i;const q=S.queue[i];
  $("#mbig").style.background=`linear-gradient(160deg,${q.tyc},${q.tyc}bb)`;
  $("#mbig").innerHTML=`<div><div style="font-size:.8rem;opacity:.85">${q.id}</div><div style="font-size:1.05rem;margin-top:.4rem">${q.t}</div><div style="font-size:.72rem;opacity:.8;margin-top:.6rem">${q.ty.includes('ريل')?'▶ فيديو':'🖼 تصميم'}</div></div>`;
  $("#mtitle").textContent=q.t;$("#mchan").innerHTML=`${chan(q.ch)} ${q.ch} · ${q.ty}`;
  $("#mkv").innerHTML=[["الرمز",q.id],["موعد النشر",q.date],["الحالة",q.st[0]]].map(k=>`<div class="kv"><b>${k[0]}</b><span>${k[1]}</span></div>`).join("");
  $("#mcap").textContent=q.cap;$("#mdrive").href="https://drive.google.com/file/d/"+q.drive+"/view";
  $("#mnote").value=notes[q.id]||"";$("#msaved").textContent=notes[q.id]?"📝 ملاحظة محفوظة":"";
  $("#ov").classList.add("on");}
$("#mx").onclick=()=>$("#ov").classList.remove("on");
$("#ov").onclick=e=>{if(e.target.id==="ov")$("#ov").classList.remove("on")};
$("#msave").onclick=()=>{const q=S.queue[cur],v=$("#mnote").value.trim();if(v)notes[q.id]=v;else delete notes[q.id];saveN();$("#msaved").textContent=v?"📝 حُفظت — الحالة: قيد التعديل":"أُزيلت الملاحظة";};
$("#mapprove").onclick=()=>{const q=S.queue[cur];delete notes[q.id];saveN();$("#msaved").textContent="✓ اعتُمد "+q.id+" — سيُنشر في موعده.";};
$("#mnext").onclick=()=>openModal((cur+1)%S.queue.length);
$("#foot").innerHTML="لوحة تشغيل متجرلينك · تعمل بوضع "+"<b id=mm></b>"+" · البيانات من /api/state";
load().then(()=>{const el=document.getElementById("mm");if(el)el.textContent=S?S.mode:"";});
</script></body></html>
