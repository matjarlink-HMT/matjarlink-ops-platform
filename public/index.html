.pcap{font-size:.8rem;color:#5f5566;background:var(--ground);border-radius:9px;padding:.4rem .55rem;line-height:1.5}
.pthread{display:flex;flex-direction:column;gap:.35rem;max-height:16rem;overflow-y:auto;padding:.2rem 0}
.pbub{display:flex;gap:.4rem;font-size:.82rem;max-width:92%}.pbub.user{align-self:flex-end;flex-direction:row-reverse}.pbub.user>span{background:var(--plum);color:#fff;border-color:var(--plum)}

.pnotebar{display:flex;gap:.4rem;align-items:center}.pnote{flex:1;min-width:0;border:1px solid var(--line);border-radius:10px;padding:.42rem .65rem;font:inherit;font-size:.83rem;background:var(--ground)}.pnote:focus{outline:2px solid var(--orange-soft);border-color:var(--orange)}
.pactions{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-top:.1rem}.btn.sm{padding:.28rem .6rem;font-size:.74rem}.pubbtn{background:#0E8C6A}.link.sm{font-size:.76rem}
/* ── countdown + generate ── */
.pcdrow{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
